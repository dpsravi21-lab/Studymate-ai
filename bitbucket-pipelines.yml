image: node:20

definitions:
  caches:
    pnpm: ~/.pnpm-store

pipelines:
  default:
    - step:
        name: Install Dependencies
        caches:
          - pnpm
        script:
          - corepack enable
          - corepack prepare pnpm@latest --activate
          - pnpm install --frozen-lockfile

    - step:
        name: Lint
        script:
          - pnpm nx lint

    - step:
        name: Test
        script:
          - pnpm nx test

    - step:
        name: Build
        script:
          - pnpm nx build