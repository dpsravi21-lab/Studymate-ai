image: node:20

definitions:
  caches:
    pnpm: ~/.pnpm-store

pipelines:
  default:
    - step:
        name: Install, Validate & Build
        caches:
          - pnpm
        script:
          # Enable and prepare pnpm
          - corepack enable
          - corepack prepare pnpm@latest --activate
          
          # Install dependencies
          - pnpm install --frozen-lockfile
          
          # Run Turborepo tasks
          - pnpm turbo run lint
          - pnpm turbo run test
          - pnpm turbo run build
